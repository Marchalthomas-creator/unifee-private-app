<h2>Audit facture électricité</h2>

<div style="margin-bottom:30px">

<label>Photo de la facture</label><br><br>

<input id="file-input" type="file" accept="image/*,.pdf">

<br><br>

<button id="scan-btn">Analyser la facture</button>

<p id="scan-status"></p>

</div>
<h3>Facture actuelle</h3>

<input id="supplier" placeholder="Fournisseur">

<input id="offer" placeholder="Offre">

<input id="power" placeholder="Puissance kVA">

<h3>Abonnement</h3>

<input id="subscription" placeholder="Montant abonnement">

<input id="subscription_transport" placeholder="Transport abonnement">

<h3>Consommation</h3>

<input id="consumption_kwh" placeholder="kWh consommés">

<input id="kwh_price" placeholder="Prix kWh">

<input id="consumption_amount" placeholder="Montant consommation">

<input id="consumption_transport" placeholder="Transport consommation">

<h3>Taxes</h3>

<input id="taxes" placeholder="Total taxes">

<input id="cta" placeholder="CTA">

<input id="tcfe" placeholder="TCFE">

<input id="cspe" placeholder="CSPE">

<h3>TVA</h3>

<input id="tva_5" placeholder="TVA 5.5">

<input id="tva_20" placeholder="TVA 20">

<h3>Total</h3>

<input id="total_ht" placeholder="Total HT">

<input id="total_ttc" placeholder="Total TTC">
